name: Deploy to Plentify SimControl Data

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'src/**'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install clasp
        run: npm install -g @google/clasp@3.1.1

      - name: Set up authentication
        run: |
          echo "${{ secrets.CLASPRC_PLENTIFY_SIMCONTROL_DATA }}" | base64 --decode > ~/.clasprc.json
          chmod 600 ~/.clasprc.json

      - name: Deploy to Plentify SimControl Data (Google Apps Script)
        working-directory: deployments/account2-data
        run: clasp push --force
